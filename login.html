<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | HasiVerse</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="login-container">

    <div class="left-side">

        <img src="{{ url_for('static', filename='image/hv-logo.png') }}"
             alt="Logo">

        <h1>Welcome Back!</h1>

        <p>

            Login to continue your learning journey
            with HasiVerse.

        </p>

    </div>

    <div class="right-side">

        <form method="POST"
              action="/login">

            <h2>Login</h2>

            <input type="email"
                   name="email"
                   placeholder="Email Address"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">

                Login

            </button>

            <p>

                Don't have an account?

                <a href="/signup">

                    Create Account

                </a>

            </p>

        </form>

    </div>

</div>

</body>

</html>
